services:
  whatsapp-bot-mysql:
    image: mysql:8.4
    container_name: ${WHATSAPP_BOT_DB_CONTAINER_NAME:-whatsapp-bot-mysql}
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-name-resolve
    environment:
      MYSQL_ROOT_PASSWORD: ${WHATSAPP_BOT_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${WHATSAPP_BOT_DB_NAME}
      WHATSAPP_BOT_DB_NAME: ${WHATSAPP_BOT_DB_NAME}
      WHATSAPP_BOT_DB_APP_USER: ${WHATSAPP_BOT_DB_APP_USER}
      WHATSAPP_BOT_DB_APP_PASSWORD: ${WHATSAPP_BOT_DB_APP_PASSWORD}
      WHATSAPP_BOT_DB_MIGRATION_USER: ${WHATSAPP_BOT_DB_MIGRATION_USER}
      WHATSAPP_BOT_DB_MIGRATION_PASSWORD: ${WHATSAPP_BOT_DB_MIGRATION_PASSWORD}
    ports:
      - ${WHATSAPP_BOT_DB_PORT:-3307}:3306
    volumes:
      - whatsapp_bot_mysql_data:/var/lib/mysql
      - ./ops/database/init/01-whatsapp-bot-bootstrap.sh:/docker-entrypoint-initdb.d/01-whatsapp-bot-bootstrap.sh:ro
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  whatsapp_bot_mysql_data:
    name: ${WHATSAPP_BOT_DB_VOLUME_NAME:-whatsapp_bot_mysql_data}
